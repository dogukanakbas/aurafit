name: aura_mobile
description: AURA Premium Fitness & Coaching Mobile Application (Flutter + Riverpod)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  shared_preferences: ^2.2.3
  http: ^1.2.1
  health: ^10.1.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
